apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: gitops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: gitops-demo
spec:
  selector:
    app: myapp
  ports:
  - port: 80
